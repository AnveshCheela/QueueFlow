<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>QueueFlow - Login</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>

<!-- Material Symbols -->

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                    "borderRadius": {

                    "spacing": {

                        "container-max": "1440px",
                        "xl": "48px",

                        "gutter": "20px",
                        "base": "4px",
                        "lg": "24px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],

                    },
                    "fontSize": {

                }

<style>
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(51, 65, 85, 0.5);
            border-top: 1px solid theme('colors.primary');
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .bg-blob {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, theme('colors.primary-container') 0%, transparent 60%);
            opacity: 0.15;
            filter: blur(80px);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            animation: pulse-slow 8s infinite alternate;
        }

        @keyframes pulse-slow {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.1; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.2; }
        }

        .input-field {
            background-color: #1e293b;
            border: 1px solid #334155;
            color: theme('colors.on-surface');
            transition: all 0.2s ease-in-out;
        }

        .input-field:focus {
            outline: none;
            border-color: theme('colors.primary');
            box-shadow: 0 0 0 4px rgba(107, 216, 203, 0.15);
        }

        .btn-primary {
            background: linear-gradient(135deg, theme('colors.primary-container'), theme('colors.primary'));
            color: theme('colors.on-primary');
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            box-shadow: 0 0 15px rgba(107, 216, 203, 0.4);
            transform: translateY(-1px);
        }

        .tab-btn {
            color: theme('colors.on-surface-variant');
            transition: all 0.2s;
        }
        .tab-btn.active {
            color: theme('colors.primary');
            border-bottom: 2px solid theme('colors.primary');
        }
    </style>
</head>
<body class="bg-[#0f172a] text-on-surface min-h-screen flex flex-col relative overflow-hidden font-body-lg">
<!-- Background Blob -->
<div class="bg-blob"></div>
<!-- TopNavBar (Transactional - Suppressed Nav, Logo Only) -->
<header class="bg-transparent flex justify-between items-center w-full px-lg py-md max-w-container-max mx-auto relative z-10">
<div class="text-primary font-headline-md font-bold text-headline-md tracking-tight">
            QueueFlow
        </div>
</header>
<!-- Main Canvas -->
<main class="flex-grow flex items-center justify-center p-md relative z-10">
<div class="glass-panel w-full max-w-md rounded-xl p-xl flex flex-col gap-lg">
<!-- Header / Tabs -->
<div class="flex flex-col items-center gap-md mb-md">
<h1 class="font-headline-lg text-headline-lg text-on-surface text-center">Welcome Back</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant text-center">Secure access to clinical systems.</p>
<div class="flex w-full mt-sm border-b border-surface-variant">
<button class="tab-btn active flex-1 py-sm font-headline-sm text-headline-sm pb-1" id="tab-signin" onclick="switchTab('signin')">Sign In</button>
<button class="tab-btn flex-1 py-sm font-headline-sm text-headline-sm pb-1" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
</div>
</div>
<!-- Sign In Form -->
<form class="flex flex-col gap-md transition-opacity duration-300" id="form-signin">
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant uppercase">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant">mail</span>
<input class="input-field w-full rounded-lg py-sm pl-xl pr-sm font-body-md text-body-md" placeholder="admin@clinic.com" required="" type="email"/>
</div>
</div>
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant uppercase">Password</label>
<a class="font-body-sm text-body-sm text-primary hover:text-primary-fixed transition-colors" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant">lock</span>
<input class="input-field w-full rounded-lg py-sm pl-xl pr-sm font-body-md text-body-md" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<button class="btn-primary w-full rounded-lg py-sm mt-sm font-headline-sm text-headline-sm flex justify-center items-center gap-xs" type="button">
                    Access Portal
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Sign Up Form (Hidden by default) -->
<form class="hidden flex-col gap-md transition-opacity duration-300 opacity-0" id="form-signup">
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant uppercase">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant">person</span>
<input class="input-field w-full rounded-lg py-sm pl-xl pr-sm font-body-md text-body-md" placeholder="Dr. Jane Doe" type="text"/>
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant uppercase">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant">mail</span>
<input class="input-field w-full rounded-lg py-sm pl-xl pr-sm font-body-md text-body-md" placeholder="jane@clinic.com" type="email"/>
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant uppercase">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant">lock</span>
<input class="input-field w-full rounded-lg py-sm pl-xl pr-sm font-body-md text-body-md" placeholder="Create password" type="password"/>
</div>
</div>
<button class="btn-primary w-full rounded-lg py-sm mt-sm font-headline-sm text-headline-sm flex justify-center items-center gap-xs" type="button">
                    Create Account
                    <span class="material-symbols-outlined">person_add</span>
</button>
</form>
</div>
</main>
<!-- Footer -->
<footer class="bg-transparent flex flex-col md:flex-row justify-between items-center w-full px-lg py-md gap-md relative z-10">
<div class="text-label-md font-label-md text-on-surface-variant">
            © 2024 QueueFlow. Clinical Futurism defined.
        </div>
<div class="flex gap-lg">
<a class="font-body-sm text-body-sm text-on-surface-variant hover:text-tertiary transition-colors cursor-pointer" href="#">Privacy Policy</a>
<a class="font-body-sm text-body-sm text-on-surface-variant hover:text-tertiary transition-colors cursor-pointer" href="#">Terms of Service</a>
<a class="font-body-sm text-body-sm text-on-surface-variant hover:text-tertiary transition-colors cursor-pointer" href="#">Support</a>
</div>
</footer>
<script>
        function switchTab(tab) {
            const signinForm = document.getElementById('form-signin');
            const signupForm = document.getElementById('form-signup');
            const tabSignin = document.getElementById('tab-signin');
            const tabSignup = document.getElementById('tab-signup');
            const headerTitle = document.querySelector('h1');

            if (tab === 'signin') {
                // UI Updates
                tabSignin.classList.add('active');
                tabSignup.classList.remove('active');
                headerTitle.textContent = "Welcome Back";

                // Form Transition
                signupForm.classList.add('opacity-0');
                setTimeout(() => {
                    signupForm.classList.add('hidden');
                    signupForm.classList.remove('flex');
                    
                    signinForm.classList.remove('hidden');
                    signinForm.classList.add('flex');
                    setTimeout(() => signinForm.classList.remove('opacity-0'), 50);
                }, 300);

            } else {
                // UI Updates
                tabSignup.classList.add('active');
                tabSignin.classList.remove('active');
                headerTitle.textContent = "Create Account";

                // Form Transition
                signinForm.classList.add('opacity-0');
                setTimeout(() => {
                    signinForm.classList.add('hidden');
                    signinForm.classList.remove('flex');
                    
                    signupForm.classList.remove('hidden');
                    signupForm.classList.add('flex');
                    setTimeout(() => signupForm.classList.remove('opacity-0'), 50);
                }, 300);
            }
        }
    </script>
</body></html>
